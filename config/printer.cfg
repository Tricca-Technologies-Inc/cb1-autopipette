# Seed printer.cfg for the Manta M8P V2.0 pipette gantry.
# Copied ONCE to /var/lib/klipper/printer.cfg on first boot, then owned by
# Klipper (SAVE_CONFIG appends/rewrites it there). To re-seed a machine,
# delete /var/lib/klipper/printer.cfg and restart klipper.service.
#
# TODO: paste the working gantry config from the current machine.

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_REPLACE-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
