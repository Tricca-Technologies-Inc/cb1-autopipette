# Nix-managed (read-only at /etc/klipper/moonraker.conf).
# Edit here in the repo, then re-run system-manager switch.

[server]
host: 0.0.0.0
port: 7125
klippy_uds_address: /run/klipper/api

[authorization]
trusted_clients:
    127.0.0.1
    192.168.0.0/16
    10.0.0.0/8
cors_domains:
    http://*.local
    http://localhost

[file_manager]
enable_object_processing: False

# NOTE: no [update_manager] — klipper/moonraker/mainsail are pinned by
# flake.lock; updates happen via `nix flake update`, not from the UI.
